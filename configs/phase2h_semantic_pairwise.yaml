phase: phase2h_semantic_pairwise
inherits: configs/phase2g_semantic_required.yaml
purpose: repair_semantic_required_command_slot_generalization_without_tuning_on_sealed_v2_failures

evidence_boundary:
  sealed_external_v2: artifacts/datasets/phase2g_external_trace_v2_semantic_required/challenge.jsonl
  sealed_external_v2_is_eval_only: true
  train_profile: phase2h_semantic_train
  val_profile: phase2h_semantic_val
  no_json_sft: true
  no_multi_adapter_route_experts: true
  no_free_shell_generation: true

architecture:
  policy_package: NativeNervousPolicyPackage
  motor_output: explicit_heads_runtime_serialization
  latent_fusion: additive
  command_reranker: pairwise_candidate_evidence
  pairwise_command_fusion: residual_lightweight_candidate_prior
  feature_fix: candidate_overlap_excludes_candidate_list_self_text

training:
  adapter_name: phase2h_semantic_pairwise_r16_alpha32_lr1e-4_len256_cap512
  lora_rank: 16
  lora_alpha: 32
  learning_rate: 0.0001
  epochs: 1
  max_length: 256
  max_train_records: 512
  max_val_records: 256
  gradient_accumulation_steps: 4
  command_intent_loss_weight: 1.0
  command_slot_loss_weight: 2.0
  use_pairwise_command_reranker: true
  pairwise_command_fusion: residual
  balance_debug_command_intents: true

acceptance:
  canary_val_command_slot_accuracy_min: 0.85
  sealed_v2_full_completion_min_for_continuation_claim: 0.50
  sealed_v2_full_beats_continuation_pp: 0.15
  sealed_v2_full_beats_no_nsi_pp: 0.15
  sealed_v2_full_beats_native_head_only_pp: 0.10

interpretation:
  if_no_nsi_delta_fails: Debug Cortex command reranking may be working, but NSI latent contribution remains unproven.
  if_native_head_only_matches_full: continuation is not needed for semantic-required command choice on this set.
  if_completion_below_0_90: do not upgrade final paper claim; create a new non-sealed train/val repair and a new sealed transfer version.
