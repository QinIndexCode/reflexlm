name: public-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e .[dev]
      - run: python scripts/audit-public-release.py
      - run: python -m pytest -q tests/test_schema.py tests/test_oracle.py tests/test_dataset_generation.py tests/test_homeostatic_synaptic_control.py
